<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Year 3 Challenge!</title>
    <meta name="mobile-web-app-capable" content="yes">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --math: #f7971e;
            --english: #8e44ad;
            --science: #16a085;
            --geo: #e74c3c;
            --history: #c0392b;
            --bg: #fef9f0;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }
        #app-container {
            width: 100%;
            max-width: 520px;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.12);
        }
        .header {
            padding: 18px 20px 14px;
            background: #2c3e50;
            color: white;
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .header-top span { font-size: 15px; font-weight: 700; }
        .score-badge {
            background: #f1c40f;
            color: #2c3e50;
            border-radius: 20px;
            padding: 4px 14px;
            font-family: 'Fredoka One', cursive;
            font-size: 18px;
        }
        .progress-bg { height: 12px; background: rgba(255,255,255,0.15); border-radius: 6px; overflow: hidden; }
        #progress-fill { height: 100%; width: 1%; background: linear-gradient(90deg, #f1c40f, #e67e22); border-radius: 6px; transition: width 0.5s ease; }

        .content { padding: 28px 24px 10px; flex-grow: 1; display: flex; flex-direction: column; align-items: center; }

        .subject-pill {
            display: inline-block;
            padding: 5px 18px;
            border-radius: 20px;
            color: white;
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        #question {
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 28px;
            line-height: 1.35;
            text-align: center;
            min-height: 70px;
        }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .opt-btn {
            padding: 18px 10px;
            border: 2.5px solid #e8e8e8;
            border-radius: 14px;
            background: white;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            color: #333;
            transition: all 0.18s ease;
            line-height: 1.3;
        }
        .opt-btn:hover:not(:disabled) { border-color: #aaa; background: #fafafa; transform: translateY(-2px); }
        .opt-btn:active { transform: scale(0.97); }
        .opt-btn.correct { background: #2ecc71 !important; color: white; border-color: #27ae60 !important; transform: scale(1.03); }
        .opt-btn.wrong   { background: #e74c3c !important; color: white; border-color: #c0392b !important; }

        #explanation-box {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 12px;
            background: #fff8e1;
            border-left: 4px solid #f1c40f;
            color: #7a5900;
            font-size: 14px;
            text-align: left;
            display: none;
            width: 100%;
        }
        #explanation-box strong { display: block; margin-bottom: 4px; }

        #controls { padding: 18px 24px 24px; }
        #next-btn {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #2c3e50, #3d566e);
            color: white;
            font-size: 18px;
            font-family: 'Fredoka One', cursive;
            letter-spacing: 0.5px;
            cursor: pointer;
            display: none;
            transition: transform 0.15s;
        }
        #next-btn:hover { transform: translateY(-2px); }

        .stars { font-size: 28px; text-align: center; margin-bottom: 8px; }
        .q-counter { font-size: 13px; color: #999; text-align: center; margin-bottom: 16px; }

        /* End screen */
        #end-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 30px;
            text-align: center;
            flex-grow: 1;
        }
        #end-screen h1 { font-family: 'Fredoka One', cursive; font-size: 38px; color: #2c3e50; }
        #end-screen p { font-size: 18px; color: #555; margin: 12px 0 30px; }
        #restart-btn {
            padding: 16px 40px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #2c3e50;
            font-size: 20px;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div id="app-container">
    <div class="header">
        <div class="header-top">
            <span>🏆 Best: <span id="high-score">0</span></span>
            <span class="score-badge">⭐ <span id="current-score">0</span></span>
            <span>Q <span id="q-num">1</span> / <span id="q-total">20</span></span>
        </div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
    </div>

    <div class="content" id="quiz-area">
        <div id="subject-tag" class="subject-pill">Topic</div>
        <div id="question">Loading...</div>
        <div class="options-grid" id="options"></div>
        <div id="explanation-box"><strong>💡 Did you know?</strong><span id="exp-text"></span></div>
    </div>

    <div id="end-screen">
        <div class="stars" id="end-stars">🌟🌟🌟</div>
        <h1>You did it!</h1>
        <p id="end-msg">Amazing work!</p>
        <button id="restart-btn" onclick="restartGame()">Play Again 🎉</button>
    </div>

    <div id="controls">
        <button id="next-btn" onclick="nextQuestion()">Next Question ➔</button>
    </div>
</div>

<script>
    // ═══════════════════════════════════════════════
    //  FULL YEAR 3 QUESTION BANK
    // ═══════════════════════════════════════════════

    const questionBank = [

        // ── MATHS: Times Tables ──
        ...generateTimesTable(3),
        ...generateTimesTable(4),
        ...generateTimesTable(8),

        // ── MATHS: Place Value ──
        { s:"Maths", q:"What is the value of the hundreds digit in 472?", a:"400", o:["40","4","4000"], e:"The digit 4 is in the hundreds column, so it is worth 400." },
        { s:"Maths", q:"What is the value of the tens digit in 835?", a:"30", o:["300","3","3000"], e:"The digit 3 is in the tens column, so it is worth 30." },
        { s:"Maths", q:"Which number is 10 more than 387?", a:"397", o:["388","477","487"], e:"Adding 10 changes the tens digit: 387 + 10 = 397." },
        { s:"Maths", q:"Which number is 100 less than 650?", a:"550", o:["640","640","750"], e:"Subtracting 100 changes the hundreds digit: 650 − 100 = 550." },
        { s:"Maths", q:"Write 500 + 60 + 7 as a number.", a:"567", o:["576","5067","5670"], e:"Hundreds + Tens + Ones = 567." },
        { s:"Maths", q:"Round 342 to the nearest 10.", a:"340", o:["300","350","400"], e:"The ones digit is 2 (less than 5), so round down to 340." },
        { s:"Maths", q:"Round 675 to the nearest 100.", a:"700", o:["600","670","680"], e:"The tens digit is 7 (5 or more), so round up to 700." },
        { s:"Maths", q:"What is 400 + 200 + 50 + 6?", a:"656", o:["4256","426","566"], e:"Add hundreds, tens and ones: 600 + 56 = 656." },

        // ── MATHS: Addition & Subtraction ──
        { s:"Maths", q:"What is 347 + 256?", a:"603", o:["593","613","503"], e:"Column addition: 7+6=13, carry 1. 4+5+1=10, carry 1. 3+2+1=6. Answer: 603." },
        { s:"Maths", q:"What is 500 − 183?", a:"317", o:["383","217","337"], e:"Use column subtraction or counting up from 183 to 500." },
        { s:"Maths", q:"What is 248 + 165?", a:"413", o:["403","313","423"], e:"8+5=13, carry 1. 4+6+1=11, carry 1. 2+1+1=4. Answer: 413." },
        { s:"Maths", q:"A shop has 500 apples. 274 are sold. How many are left?", a:"226", o:["274","326","236"], e:"500 − 274 = 226." },

        // ── MATHS: Multiplication & Division ──
        { s:"Maths", q:"What is 5 × 7?", a:"35", o:["30","25","40"], e:"5 × 7 = 35. Count in 5s: 5, 10, 15, 20, 25, 30, 35." },
        { s:"Maths", q:"What is 32 ÷ 4?", a:"8", o:["6","9","7"], e:"32 ÷ 4 = 8. Check: 4 × 8 = 32 ✓" },
        { s:"Maths", q:"What is 6 × 9?", a:"54", o:["48","63","45"], e:"6 × 9 = 54. Try 6 × 10 = 60, then take away 6." },
        { s:"Maths", q:"24 children sit in 3 equal rows. How many in each row?", a:"8", o:["6","9","7"], e:"24 ÷ 3 = 8 children per row." },
        { s:"Maths", q:"What is 7 × 8?", a:"56", o:["48","63","54"], e:"7 × 8 = 56. A fun trick: 5, 6, 7, 8 → 56 = 7 × 8!" },

        // ── MATHS: Fractions ──
        { s:"Maths", q:"What is ½ of 48?", a:"24", o:["12","36","23"], e:"Divide by 2: 48 ÷ 2 = 24." },
        { s:"Maths", q:"What is ¼ of 20?", a:"5", o:["4","10","8"], e:"Divide by 4: 20 ÷ 4 = 5." },
        { s:"Maths", q:"Which fraction is equivalent to ½?", a:"2/4", o:["1/3","3/5","2/6"], e:"2/4 = ½ because both top and bottom are doubled." },
        { s:"Maths", q:"What is ⅓ of 30?", a:"10", o:["3","15","9"], e:"Divide by 3: 30 ÷ 3 = 10." },
        { s:"Maths", q:"Which is the largest fraction: ¼, ½ or ¾?", a:"¾", o:["¼","½","They are equal"], e:"The larger the numerator, the larger the fraction when denominators are the same." },
        { s:"Maths", q:"What fraction of this shape is shaded if 3 out of 8 parts are coloured?", a:"3/8", o:["5/8","8/3","3/5"], e:"Shaded parts over total parts = 3/8." },

        // ── MATHS: Measurement ──
        { s:"Maths", q:"How many centimetres are in 1 metre?", a:"100 cm", o:["10 cm","1000 cm","50 cm"], e:"1 metre = 100 centimetres." },
        { s:"Maths", q:"How many grams are in 1 kilogram?", a:"1000 g", o:["100 g","500 g","10 g"], e:"1 kilogram = 1000 grams." },
        { s:"Maths", q:"How many millilitres are in 1 litre?", a:"1000 ml", o:["100 ml","500 ml","10 ml"], e:"1 litre = 1000 millilitres." },
        { s:"Maths", q:"What is the perimeter of a square with sides of 5 cm?", a:"20 cm", o:["10 cm","25 cm","15 cm"], e:"Perimeter = 4 × 5 = 20 cm." },
        { s:"Maths", q:"What is the area of a rectangle 6 cm long and 3 cm wide?", a:"18 cm²", o:["9 cm²","18 cm","12 cm²"], e:"Area = length × width = 6 × 3 = 18 cm²." },
        { s:"Maths", q:"A film starts at 2:15 pm and lasts 45 minutes. When does it end?", a:"3:00 pm", o:["2:45 pm","3:15 pm","2:60 pm"], e:"2:15 + 0:45 = 3:00 pm." },

        // ── MATHS: Shapes & Geometry ──
        { s:"Maths", q:"How many sides does a hexagon have?", a:"6", o:["5","7","8"], e:"Hex- means six. A hexagon has 6 sides." },
        { s:"Maths", q:"How many faces does a cube have?", a:"6", o:["4","8","12"], e:"A cube has 6 square faces." },
        { s:"Maths", q:"What is the name of an angle less than 90°?", a:"Acute", o:["Obtuse","Right","Reflex"], e:"Acute angles are sharp (less than 90°). Obtuse angles are blunt (more than 90°)." },
        { s:"Maths", q:"A right angle is equal to how many degrees?", a:"90°", o:["45°","180°","360°"], e:"A right angle is exactly 90°, like the corner of a square." },
        { s:"Maths", q:"What is a quadrilateral?", a:"A shape with 4 sides", o:["A shape with 3 sides","A 3D shape","A shape with 6 sides"], e:"Quad means four. All quadrilaterals have 4 sides (e.g. squares, rectangles, rhombuses)." },
        { s:"Maths", q:"Which 3D shape has a circular base and comes to a point?", a:"Cone", o:["Cylinder","Pyramid","Sphere"], e:"A cone has one circular face and one curved surface ending in a point." },

        // ── ENGLISH: Spelling (Statutory Year 3/4 Words) ──
        { s:"English", q:"Which is the correct spelling?", a:"accident", o:["acident","accedent","axident"], e:"'Accident' is a Year 3/4 statutory spelling word." },
        { s:"English", q:"Which is the correct spelling?", a:"believe", o:["beleive","beleeve","beleve"], e:"Remember: don't be-LIE-ve a lie!" },
        { s:"English", q:"Which is the correct spelling?", a:"calendar", o:["calender","calander","calandar"], e:"'Calendar' — think of the 'ar' ending." },
        { s:"English", q:"Which is the correct spelling?", a:"describe", o:["discribe","describ","discreb"], e:"'Describe' — de-SCRIBE. A scribe is someone who writes." },
        { s:"English", q:"Which is the correct spelling?", a:"experiment", o:["experement","expirement","experimant"], e:"'Experiment' — think of 'expert' at the start." },
        { s:"English", q:"Which is the correct spelling?", a:"favourite", o:["favorit","favouirite","favrite"], e:"'Favourite' — note the 'ou' in the middle." },
        { s:"English", q:"Which is the correct spelling?", a:"February", o:["Febuary","Feburary","Februry"], e:"'February' — remember the hidden first 'r': Feb-ru-ary." },
        { s:"English", q:"Which is the correct spelling?", a:"grammar", o:["grammer","gramar","gramur"], e:"'Grammar' — ends in -ar, not -er." },
        { s:"English", q:"Which is the correct spelling?", a:"island", o:["iland","isalnd","islund"], e:"'Island' has a silent 's': is-land." },
        { s:"English", q:"Which is the correct spelling?", a:"library", o:["librery","libary","liberry"], e:"'Library' — lib-RA-ry. Don't skip the first 'r'." },
        { s:"English", q:"Which is the correct spelling?", a:"medicine", o:["medicene","medecine","medisine"], e:"'Medicine' — med-i-CINE." },
        { s:"English", q:"Which is the correct spelling?", a:"natural", o:["naturel","natchural","natrul"], e:"'Natural' — nat-u-ral." },
        { s:"English", q:"Which is the correct spelling?", a:"opposite", o:["oposite","opposit","oppisite"], e:"'Opposite' — double 'p' in the middle." },
        { s:"English", q:"Which is the correct spelling?", a:"perhaps", o:["perhapse","purrhaps","perhapps"], e:"'Perhaps' — per-haps." },
        { s:"English", q:"Which is the correct spelling?", a:"straight", o:["striaght","straght","strate"], e:"'Straight' — remember the silent 'gh'." },

        // ── ENGLISH: Grammar ──
        { s:"English", q:"What type of word is 'quickly'?", a:"Adverb", o:["Adjective","Noun","Verb"], e:"Adverbs describe how, when or where an action happens. 'Quickly' tells us HOW." },
        { s:"English", q:"What type of word is 'enormous'?", a:"Adjective", o:["Adverb","Noun","Verb"], e:"Adjectives describe nouns. 'Enormous' describes how big something is." },
        { s:"English", q:"What type of word is 'scrambled'?", a:"Verb", o:["Noun","Adjective","Adverb"], e:"Verbs are doing/action words. 'Scrambled' describes the action." },
        { s:"English", q:"What punctuation mark ends a question?", a:"Question mark ?", o:["Full stop .","Exclamation mark !","Comma ,"], e:"Questions always end with a question mark (?)." },
        { s:"English", q:"Which sentence uses a comma correctly?", a:"After lunch, we went to the park.", o:["After lunch we, went to the park.","After, lunch we went to the park.","After lunch we went, to the park."], e:"A comma follows a fronted adverbial ('After lunch,') to separate it from the main clause." },
        { s:"English", q:"What is a noun?", a:"A person, place or thing", o:["A doing word","A describing word","A joining word"], e:"Nouns name things: cat, London, happiness." },
        { s:"English", q:"Which word is a conjunction?", a:"because", o:["quickly","beautiful","ran"], e:"Conjunctions join clauses together. 'Because' explains reasons." },
        { s:"English", q:"Which sentence is in the past tense?", a:"She skipped to school.", o:["She skips to school.","She will skip to school.","She is skipping to school."], e:"Past tense describes something that already happened. 'Skipped' is the past tense of 'skip'." },
        { s:"English", q:"What type of noun is 'happiness'?", a:"Abstract noun", o:["Proper noun","Common noun","Collective noun"], e:"Abstract nouns are things you can't touch or see — feelings and ideas like happiness, love, and courage." },
        { s:"English", q:"What does an apostrophe show in 'the dog's bone'?", a:"Possession (it belongs to the dog)", o:["A missing letter","Plural","A question"], e:"The apostrophe + s ('s) shows the bone belongs to the dog." },
        { s:"English", q:"Which sentence uses speech marks correctly?", a:'"I love reading," said Mia.', o:['"I love reading, said Mia."','I love reading, "said Mia."','I love "reading, said Mia."'], e:"Speech marks go around the exact words spoken by a character." },
        { s:"English", q:"Which prefix makes 'happy' mean the opposite?", a:"un-", o:["re-","pre-","mis-"], e:"Un + happy = unhappy. 'Un-' often means 'not'." },
        { s:"English", q:"Which suffix turns 'quick' into an adverb?", a:"-ly", o:["-ness","-ful","-ment"], e:"quick + ly = quickly. '-ly' is the most common adverb suffix." },

        // ── SCIENCE: Plants ──
        { s:"Science", q:"What process do plants use to make their own food using sunlight?", a:"Photosynthesis", o:["Digestion","Respiration","Germination"], e:"Plants absorb sunlight, water and CO₂ to make glucose. This is photosynthesis." },
        { s:"Science", q:"What part of a plant absorbs water from the soil?", a:"Roots", o:["Leaves","Stem","Flower"], e:"Roots anchor the plant and take in water and nutrients from the soil." },
        { s:"Science", q:"What do we call the process when a seed starts to grow?", a:"Germination", o:["Pollination","Photosynthesis","Fertilisation"], e:"Germination is when a seed sprouts its first root and shoot." },
        { s:"Science", q:"What carries water from the roots up to the leaves?", a:"The stem", o:["The petals","The seeds","The roots"], e:"The stem acts like a drinking straw, transporting water and nutrients upward." },
        { s:"Science", q:"Which part of the flower attracts insects with colour and scent?", a:"Petals", o:["Stamens","Roots","Sepals"], e:"Brightly coloured petals and sweet scent attract pollinators like bees." },

        // ── SCIENCE: Rocks ──
        { s:"Science", q:"Which type of rock is formed from cooled lava?", a:"Igneous", o:["Sedimentary","Metamorphic","Fossil"], e:"Igneous means 'fire' — these rocks form when molten lava cools and hardens." },
        { s:"Science", q:"Which rock is formed from layers of sand and mud squashed together?", a:"Sedimentary", o:["Igneous","Metamorphic","Limestone"], e:"Sedimentary rocks form in layers over millions of years. Sandstone is an example." },
        { s:"Science", q:"Which type of rock is formed when existing rock is changed by heat or pressure?", a:"Metamorphic", o:["Igneous","Sedimentary","Granite"], e:"Metamorphic means 'changed form'. Marble is a metamorphic rock." },
        { s:"Science", q:"What is a fossil?", a:"The preserved remains of an ancient living thing", o:["A type of igneous rock","A crystal","A type of soil"], e:"Fossils form when plants or animals die and are slowly replaced by minerals over millions of years." },
        { s:"Science", q:"What is soil mainly made from?", a:"Tiny pieces of rock and dead plants", o:["Water and air","Sand and clay only","Chemicals and minerals only"], e:"Soil is a mixture of weathered rock, dead organic matter, water, air and tiny organisms." },

        // ── SCIENCE: Light ──
        { s:"Science", q:"Which of these is NOT a light source?", a:"The Moon", o:["The Sun","A candle","A torch"], e:"The Moon reflects sunlight — it does not produce its own light." },
        { s:"Science", q:"What happens when light hits a shiny, smooth surface?", a:"It reflects", o:["It bends","It disappears","It changes colour"], e:"Light bounces off smooth surfaces. This is called reflection. Mirrors are great examples." },
        { s:"Science", q:"Why do shadows form?", a:"Light cannot pass through opaque objects", o:["Objects absorb all light","Light bends around objects","Transparent objects block light"], e:"Opaque objects block light, creating a dark area behind them — a shadow!" },
        { s:"Science", q:"What is a transparent material?", a:"One that lets light through clearly", o:["One that blocks all light","One that bends light","One that reflects light"], e:"Transparent materials (like glass) allow light to pass through clearly. You can see through them." },
        { s:"Science", q:"At what time of day is your shadow the shortest?", a:"Midday (noon)", o:["Early morning","Late afternoon","Sunset"], e:"At noon, the Sun is directly overhead, so it casts the shortest shadow." },

        // ── SCIENCE: Forces & Magnets ──
        { s:"Science", q:"What force pulls objects toward the Earth?", a:"Gravity", o:["Magnetism","Friction","Air resistance"], e:"Gravity is the force that attracts all objects with mass toward each other — it keeps us on the ground." },
        { s:"Science", q:"What do we call a force that slows down moving objects?", a:"Friction", o:["Gravity","Magnetism","Tension"], e:"Friction acts between surfaces rubbing together. It slows things down and creates heat." },
        { s:"Science", q:"What happens when two north poles of a magnet are put together?", a:"They repel (push away)", o:["They attract","They stick together","Nothing happens"], e:"Opposite poles attract; like poles repel. North + North = push away!" },
        { s:"Science", q:"Which material is attracted to a magnet?", a:"Iron", o:["Wood","Plastic","Glass"], e:"Magnets attract magnetic metals: iron, nickel and cobalt. Most other materials are not magnetic." },
        { s:"Science", q:"What is the name of the force that a magnet exerts on magnetic materials?", a:"Magnetic force", o:["Gravity","Friction","Air resistance"], e:"A magnet exerts a non-contact magnetic force that can attract or repel without touching." },

        // ── SCIENCE: Animals including Humans ──
        { s:"Science", q:"What does the skeleton do? (Choose the BEST answer)", a:"Supports the body and protects organs", o:["Pumps blood around the body","Makes food for the body","Controls our movements"], e:"The skeleton has three main jobs: support, protection and allowing movement." },
        { s:"Science", q:"Which organ pumps blood around your body?", a:"Heart", o:["Lungs","Brain","Stomach"], e:"The heart is a muscular pump that circulates blood through the body." },
        { s:"Science", q:"What do your lungs do?", a:"Take in oxygen and remove carbon dioxide", o:["Digest food","Pump blood","Control thinking"], e:"You breathe in oxygen (for cells to use) and breathe out waste carbon dioxide." },
        { s:"Science", q:"Which type of teeth are used for tearing food?", a:"Canines", o:["Incisors","Molars","Premolars"], e:"Canines are sharp, pointed teeth used for tearing and gripping food." },
        { s:"Science", q:"What do herbivores eat?", a:"Only plants", o:["Only meat","Plants and meat","Insects only"], e:"Herb = plant. Herbivores like cows and rabbits eat only plants." },

        // ── GEOGRAPHY ──
        { s:"Geography", q:"What are the four countries of the United Kingdom?", a:"England, Scotland, Wales, Northern Ireland", o:["England, Ireland, Wales, France","England, Scotland, Ireland, Wales","Britain, Scotland, Wales, Northern Ireland"], e:"The UK = England + Scotland + Wales + Northern Ireland." },
        { s:"Geography", q:"What is the capital city of Scotland?", a:"Edinburgh", o:["Glasgow","Aberdeen","Dundee"], e:"Edinburgh is Scotland's capital. Glasgow is the largest city, but NOT the capital." },
        { s:"Geography", q:"What is the capital city of Wales?", a:"Cardiff", o:["Swansea","Newport","Aberystwyth"], e:"Cardiff became the official capital of Wales in 1955." },
        { s:"Geography", q:"On which continent is the UK located?", a:"Europe", o:["North America","Asia","Africa"], e:"The UK is an island nation located in north-western Europe." },
        { s:"Geography", q:"What are lines of latitude called that run parallel to the equator?", a:"Parallels", o:["Meridians","Tropics","Grid lines"], e:"Lines of latitude (parallels) measure distance north or south of the equator." },
        { s:"Geography", q:"Which ocean is to the west of the UK?", a:"Atlantic Ocean", o:["Pacific Ocean","Indian Ocean","Arctic Ocean"], e:"The Atlantic Ocean separates the UK from North America to the west." },
        { s:"Geography", q:"What is a village?", a:"A small settlement with a few houses", o:["A very large city","A settlement with no houses","A town with a cathedral"], e:"A village is smaller than a town. It usually has fewer services like shops." },
        { s:"Geography", q:"What type of map shows hills, rivers and natural features?", a:"Physical map", o:["Political map","Road map","Weather map"], e:"Physical maps show the natural landscape: mountains, rivers, valleys and plains." },
        { s:"Geography", q:"What is the equator?", a:"An imaginary line around the middle of the Earth", o:["The edge of the Earth","A line from north to south","A continent"], e:"The equator is at 0° latitude — it divides Earth into the Northern and Southern hemispheres." },

        // ── HISTORY ──
        { s:"History", q:"Who was the first female Prime Minister of the UK?", a:"Margaret Thatcher", o:["Queen Victoria","Boudicca","Florence Nightingale"], e:"Margaret Thatcher became the UK's first female PM in 1979." },
        { s:"History", q:"What were the ancient Egyptians famous for building?", a:"Pyramids", o:["Castles","Colosseum","Stonehenge"], e:"The Ancient Egyptians built huge pyramids as tombs for their pharaohs." },
        { s:"History", q:"What was the name of the first successful powered aeroplane flight?", a:"The Wright Brothers' Flyer", o:["The Spitfire","Concorde","The Lancaster"], e:"Orville and Wilbur Wright made the first powered flight in 1903 in their Flyer aircraft." },
        { s:"History", q:"In which year did World War II end?", a:"1945", o:["1939","1918","1945"], e:"World War II ended in 1945 — in Europe in May and in the Pacific in September." },
        { s:"History", q:"Who was the legendary queen of the Iceni tribe who fought against the Romans?", a:"Boudicca", o:["Cleopatra","Queen Victoria","Mary Queen of Scots"], e:"Boudicca led a famous revolt against Roman rule in Britain around AD 60–61." },
        { s:"History", q:"What did Stone Age people use to make tools?", a:"Flint (stone)", o:["Iron","Bronze","Wood only"], e:"Stone Age people chipped flint into sharp tools for hunting and cutting." },
        { s:"History", q:"Which ancient civilisation built the Colosseum?", a:"The Romans", o:["The Greeks","The Egyptians","The Vikings"], e:"The Romans built the Colosseum in Rome around AD 70–80 for gladiatorial contests." },
    ];

    // Generate times table questions dynamically
    function generateTimesTable(t) {
        const qs = [];
        for (let n = 1; n <= 12; n++) {
            const ans = t * n;
            const wrongs = new Set();
            while (wrongs.size < 3) {
                const off = [ans - (t*2), ans + t, ans - t, ans + (t*2), ans + t*3]
                    .filter(v => v > 0 && v !== ans);
                wrongs.add(off[Math.floor(Math.random() * off.length)]);
            }
            qs.push({
                s: "Maths",
                q: `What is ${t} × ${n}?`,
                a: String(ans),
                o: [...wrongs].map(String),
                e: `${t} × ${n} = ${ans}. The ${t} times table: ${Array.from({length:12},(_,i)=>`${t}×${i+1}=${t*(i+1)}`).join(', ')}.`
            });
            // Also add division
            qs.push({
                s: "Maths",
                q: `What is ${ans} ÷ ${t}?`,
                a: String(n),
                o: [...wrongs].map(v => String(Math.round(v / t))).filter(v => v !== String(n)).slice(0,3),
                e: `${ans} ÷ ${t} = ${n}. This is the inverse of ${t} × ${n} = ${ans}.`
            });
        }
        return qs;
    }

    // ═══════════════════════════════════════════════
    //  GAME LOGIC
    // ═══════════════════════════════════════════════

    const MAX_QUESTIONS = 20;
    let score = 0;
    let qCount = 0;
    let currentAnswer = "";
    let usedIndexes = [];

    function shuffle(arr) {
        return [...arr].sort(() => Math.random() - 0.5);
    }

    function pickQuestion() {
        if (usedIndexes.length >= questionBank.length) usedIndexes = [];
        let idx;
        do { idx = Math.floor(Math.random() * questionBank.length); }
        while (usedIndexes.includes(idx));
        usedIndexes.push(idx);
        return questionBank[idx];
    }

    function loadQuestion() {
        document.getElementById("explanation-box").style.display = "none";
        document.getElementById("next-btn").style.display = "none";

        const data = pickQuestion();
        currentAnswer = String(data.a);

        // Subject pill
        const pill = document.getElementById("subject-tag");
        pill.innerText = data.s;
        const colors = { Maths: "var(--math)", English: "var(--english)", Science: "var(--science)", Geography: "var(--geo)", History: "var(--history)" };
        pill.style.background = colors[data.s] || "#555";

        document.getElementById("question").innerText = data.q;
        document.getElementById("exp-text").innerText = data.e;

        // Build options: answer + up to 3 distractors, shuffled, deduplicated
        let pool = [String(data.a), ...data.o.map(String)].filter((v, i, arr) => arr.indexOf(v) === i);
        pool = shuffle(pool).slice(0, 4);
        if (!pool.includes(String(data.a))) { pool[0] = String(data.a); pool = shuffle(pool); }

        const grid = document.getElementById("options");
        grid.innerHTML = "";
        pool.forEach(text => {
            const b = document.createElement("button");
            b.className = "opt-btn";
            b.innerText = text;
            b.onclick = () => checkAnswer(text, b, pool);
            grid.appendChild(b);
        });

        // Progress
        document.getElementById("q-num").innerText = qCount;
        document.getElementById("q-total").innerText = MAX_QUESTIONS;
        document.getElementById("progress-fill").style.width = ((qCount - 1) / MAX_QUESTIONS * 100) + "%";
        document.getElementById("high-score").innerText = localStorage.getItem("y3best") || 0;
    }

    function checkAnswer(chosen, btn, pool) {
        const allBtns = document.querySelectorAll(".opt-btn");
        allBtns.forEach(b => b.disabled = true);

        if (chosen === currentAnswer) {
            btn.classList.add("correct");
            score += 10;
            document.getElementById("current-score").innerText = score;
        } else {
            btn.classList.add("wrong");
            allBtns.forEach(b => { if (b.innerText === currentAnswer) b.classList.add("correct"); });
            document.getElementById("explanation-box").style.display = "block";
        }

        const best = parseInt(localStorage.getItem("y3best") || "0");
        if (score > best) localStorage.setItem("y3best", score);
        document.getElementById("high-score").innerText = localStorage.getItem("y3best");

        document.getElementById("next-btn").style.display = "block";
    }

    function nextQuestion() {
        if (qCount >= MAX_QUESTIONS) {
            showEndScreen();
        } else {
            qCount++;
            loadQuestion();
        }
    }

    function showEndScreen() {
        document.getElementById("quiz-area").style.display = "none";
        document.getElementById("controls").style.display = "none";
        const endScreen = document.getElementById("end-screen");
        endScreen.style.display = "flex";

        const pct = score / (MAX_QUESTIONS * 10);
        let stars = "⭐", msg = "Keep practising — you've got this!";
        if (pct >= 0.9) { stars = "🌟🌟🌟"; msg = `Incredible! You scored ${score}/${MAX_QUESTIONS*10}. You're a Year 3 superstar!`; }
        else if (pct >= 0.7) { stars = "⭐⭐⭐"; msg = `Great job! You scored ${score}/${MAX_QUESTIONS*10}. Almost perfect!`; }
        else if (pct >= 0.5) { stars = "⭐⭐"; msg = `Good effort! You scored ${score}/${MAX_QUESTIONS*10}. Keep practising!`; }
        else { stars = "⭐"; msg = `You scored ${score}/${MAX_QUESTIONS*10}. Don't give up — try again!`; }

        document.getElementById("end-stars").innerText = stars;
        document.getElementById("end-msg").innerText = msg;
    }

    function restartGame() {
        score = 0;
        qCount = 1;
        usedIndexes = [];
        document.getElementById("current-score").innerText = 0;
        document.getElementById("end-screen").style.display = "none";
        document.getElementById("quiz-area").style.display = "flex";
        document.getElementById("controls").style.display = "block";
        loadQuestion();
    }

    // Start!
    qCount = 1;
    loadQuestion();
</script>
